<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Eridanus · Live2D Chat</title>
  <style>
    /* ===== 配色（取自 配色.jpg：桃雾 #FFC0E9 / 青瑶 #99A5FF），并向模型色扩展出更丰富的层次 ===== */
    :root {
      --peach: #ffc0e9;
      --peri: #99a5ff;
      --rose: #ff8fce;       /* 桃雾加深，做强调/按钮 */
      --rose-hot: #f46eb4;
      --indigo: #6e78e8;     /* 青瑶加深，做用户气泡/强调 */
      --violet: #b89bff;     /* 桃↔青之间的过渡紫，增加层次 */
      --ink: #4a3a5e;        /* 文字（深紫，二次元感） */
      --ink-soft: #7a6f96;
      --brand: linear-gradient(115deg, #ffc0e9 0%, #c9a8ff 46%, #99a5ff 100%);
      --brand-btn: linear-gradient(135deg, #ff8fce 0%, #b89bff 52%, #99a5ff 100%);
      --glass: rgba(255, 255, 255, 0.5);
      --glass-line: rgba(255, 255, 255, 0.75);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--ink);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== 背景：立绘 + 遮罩（不直接裸露背景图） ===== */
    #bg {
      position: fixed; inset: -3%; z-index: 0;
      background: url("/live2dchat/asset/bg.jpg") center center / cover no-repeat;
      filter: blur(4px) saturate(1.12) brightness(1.06);
      transform: scale(1.06);        /* 放大遮住模糊边缘 */
    }
    /* 遮罩：上浅下深的桃雾→青瑶/紫色веil，统一配色并保证下方聊天区可读 */
    #bg-mask {
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(130% 90% at 18% 12%, rgba(255, 192, 233, 0.45), transparent 55%),
        radial-gradient(120% 90% at 92% 30%, rgba(153, 165, 255, 0.40), transparent 55%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.20) 0%, rgba(173, 162, 240, 0.34) 52%, rgba(108, 96, 168, 0.55) 100%);
    }
    /* 装饰星芒（二次元闪烁） */
    .sparkles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .sparkles i {
      position: absolute; font-style: normal; color: #fff;
      filter: drop-shadow(0 0 7px rgba(255, 192, 233, 0.95));
      animation: twinkle 4.5s ease-in-out infinite;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.25; transform: scale(0.75); } 50% { opacity: 0.95; transform: scale(1.12); } }

    #live2d-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 3; }

    #status {
      position: absolute; left: 22px; top: 18px; z-index: 5;
      font-size: 12px; color: var(--ink); pointer-events: none;
      background: rgba(255, 255, 255, 0.55); padding: 5px 12px; border-radius: 999px;
      backdrop-filter: blur(8px); box-shadow: 0 4px 14px rgba(120, 110, 180, 0.18);
    }

    /* 头顶气泡 */
    #bubble {
      position: absolute; left: 50%; top: 10px; transform: translateX(-50%);
      z-index: 4; max-width: 360px; padding: 11px 15px; border-radius: 16px;
      background: rgba(255, 255, 255, 0.94); color: var(--ink);
      font-size: 14px; line-height: 1.55;
      box-shadow: 0 12px 30px rgba(123, 110, 200, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.8);
      opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
      white-space: pre-wrap; word-break: break-word;
    }
    #bubble.visible { opacity: 1; }
    #bubble::after {
      content: ""; position: absolute; left: 50%; bottom: -7px; transform: translateX(-50%);
      border-width: 7px 7px 0 7px; border-style: solid;
      border-color: rgba(255, 255, 255, 0.94) transparent transparent transparent;
    }
    #bubble img { max-width: 200px; max-height: 200px; border-radius: 10px; display: block; }

    /* 缩放控制（桌面/移动通用） */
    .zoom-ctl {
      position: fixed; left: 22px; bottom: 24px; z-index: 6;
      display: flex; flex-direction: column; gap: 1px; overflow: hidden;
      border-radius: 14px; background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--glass-line);
      backdrop-filter: blur(10px); box-shadow: 0 8px 22px rgba(120, 110, 180, 0.22);
    }
    .zoom-ctl button {
      width: 40px; height: 40px; border: none; background: transparent;
      color: var(--ink); font-size: 20px; cursor: pointer; line-height: 1;
    }
    .zoom-ctl button:hover { background: rgba(255, 255, 255, 0.45); }

    /* ===== 聊天卡片 ===== */
    .chat-shell {
      position: fixed; z-index: 7; top: 18px; right: 18px; bottom: 18px;
      width: min(440px, 38vw); min-width: 320px;
      display: flex; flex-direction: column;
      background: var(--glass); border: 1px solid var(--glass-line);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 55px rgba(90, 78, 150, 0.30);
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
    }

    #history-panel { display: none; flex: 1; min-height: 0; flex-direction: column; }
    #history-panel.open { display: flex; }

    #history-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; color: #fff; background: var(--brand);
      box-shadow: 0 6px 18px rgba(150, 130, 220, 0.25);
    }
    #history-head .title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    #history-head .dot { width: 8px; height: 8px; border-radius: 50%; background: #b6ffd0; box-shadow: 0 0 8px #b6ffd0; }
    #history-head .actions { display: flex; gap: 10px; }
    #history-head button {
      border: none; background: rgba(255, 255, 255, 0.25); color: #fff;
      cursor: pointer; font-size: 12px; padding: 5px 12px; border-radius: 999px;
    }
    #history-head button:hover { background: rgba(255, 255, 255, 0.42); }

    #history-log {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: rgba(153, 165, 255, 0.6) transparent;
    }
    #history-log::-webkit-scrollbar { width: 7px; }
    #history-log::-webkit-scrollbar-thumb { background: rgba(153, 165, 255, 0.5); border-radius: 999px; }
    .h-line {
      max-width: 84%; padding: 9px 13px; border-radius: 15px;
      font-size: 13.5px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
      box-shadow: 0 5px 16px rgba(120, 110, 180, 0.14);
    }
    .h-user {
      align-self: flex-end; color: #fff; border-bottom-right-radius: 5px;
      background: linear-gradient(135deg, var(--peri) 0%, var(--indigo) 100%);
    }
    .h-bot {
      align-self: flex-start; color: var(--ink); border-bottom-left-radius: 5px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 192, 233, 0.5);
    }
    .h-line img { max-width: 100%; border-radius: 9px; display: block; cursor: pointer; }

    /* 输入条：卡片内最后一行的 flex 行（移动端不会跑偏） */
    #chat-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.42);
    }
    #chat-input {
      flex: 1 1 auto; min-width: 0; height: 42px; padding: 0 16px;
      border: 1px solid rgba(153, 165, 255, 0.4); border-radius: 999px;
      background: rgba(255, 255, 255, 0.96); font-size: 14px; color: var(--ink); outline: none;
    }
    #chat-input:focus { border-color: var(--peri); box-shadow: 0 0 0 3px rgba(153, 165, 255, 0.22); }
    .bar-btn {
      flex: 0 0 auto; height: 42px; min-width: 42px; padding: 0 20px;
      border: none; border-radius: 999px; cursor: pointer; font-size: 14px; color: #fff;
      background: var(--brand-btn); box-shadow: 0 8px 18px rgba(180, 120, 220, 0.35);
    }
    .bar-btn:hover { filter: brightness(1.06); }
    /* 📜 折叠按钮：圆形图标按钮 */
    #history-toggle {
      flex: 0 0 auto; width: 42px; height: 42px; padding: 0; font-size: 18px;
      border: 1px solid var(--glass-line); border-radius: 50%;
      background: rgba(255, 255, 255, 0.85); color: var(--ink-soft); cursor: pointer;
    }
    /* 桌面：聊天常驻右侧整列，隐藏“折叠/收起”入口 */
    #history-toggle, #history-close { display: none; }

    /* ===== 移动端：底部抽屉，默认折叠只显示输入条 ===== */
    @media (max-width: 767px) {
      .chat-shell {
        top: auto; left: 10px; right: 10px; bottom: 10px;
        width: auto; min-width: 0; height: auto; max-height: 82vh;
        border-radius: 22px;
      }
      #history-panel.open { max-height: 64vh; }
      /* 折叠态：只剩输入条（圆角药丸） */
      #history-toggle { display: inline-flex; align-items: center; justify-content: center; }
      #history-close { display: inline-block; }
      #status { left: 12px; top: 12px; }
      #bubble { max-width: 78vw; }
      .zoom-ctl { left: 12px; top: 54px; bottom: auto; }
      #history-log { padding: 12px; }
    }

    /* ===== 口令门 ===== */
    #login-mask {
      position: fixed; inset: 0; z-index: 30; display: none;
      align-items: center; justify-content: center;
      background: linear-gradient(125deg, rgba(255, 192, 233, 0.55), rgba(153, 165, 255, 0.6));
      backdrop-filter: blur(10px);
    }
    #login-mask.show { display: flex; }
    #login-box {
      width: min(330px, 86vw); padding: 28px 24px 22px; border-radius: 22px; text-align: center;
      background: rgba(255, 255, 255, 0.94); box-shadow: 0 24px 60px rgba(90, 78, 150, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    #login-box h3 { margin: 0 0 16px; font-size: 17px; color: var(--ink); font-weight: 700; }
    #login-pwd {
      width: 100%; height: 44px; padding: 0 14px; border: 1px solid rgba(153, 165, 255, 0.45);
      border-radius: 13px; font-size: 14px; outline: none; color: var(--ink);
    }
    #login-pwd:focus { border-color: var(--peri); box-shadow: 0 0 0 3px rgba(153, 165, 255, 0.22); }
    #login-btn {
      margin-top: 14px; width: 100%; height: 44px; border: none; border-radius: 13px;
      color: #fff; font-size: 15px; cursor: pointer; background: var(--brand-btn);
      box-shadow: 0 10px 22px rgba(180, 120, 220, 0.35);
    }
    #login-err { margin-top: 9px; min-height: 16px; font-size: 12px; color: #e3477a; }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="bg-mask"></div>
  <div class="sparkles" aria-hidden="true">
    <i style="left:14%; top:22%; font-size:22px; animation-delay:0s;">✦</i>
    <i style="left:62%; top:14%; font-size:14px; animation-delay:1.2s;">✧</i>
    <i style="left:40%; top:70%; font-size:18px; animation-delay:2.1s;">✦</i>
    <i style="left:84%; top:62%; font-size:13px; animation-delay:0.6s;">✧</i>
  </div>

  <canvas id="live2d-canvas"></canvas>
  <div id="status">正在加载 Live2D…</div>
  <div id="bubble"></div>

  <div class="zoom-ctl">
    <button id="zoom-in" type="button" title="放大">＋</button>
    <button id="zoom-out" type="button" title="缩小">－</button>
  </div>

  <aside class="chat-shell">
    <!-- 初始 open 由脚本按宽度决定：桌面常驻展开，移动端默认折叠 -->
    <section id="history-panel">
      <div id="history-head">
        <span class="title"><span class="dot"></span>对话</span>
        <div class="actions">
          <button id="history-clear" type="button">清空</button>
          <button id="history-close" type="button">收起</button>
        </div>
      </div>
      <div id="history-log"></div>
    </section>
    <div id="chat-bar">
      <button id="history-toggle" class="" type="button" title="对话记录">📜</button>
      <input id="chat-input" type="text" placeholder="聊点什么…（回车发送）" autocomplete="off" />
      <button id="chat-send" class="bar-btn" type="button">发送</button>
    </div>
  </aside>

  <div id="login-mask">
    <div id="login-box">
      <h3>请输入访问口令</h3>
      <input id="login-pwd" type="password" placeholder="访问口令" autocomplete="current-password" />
      <button id="login-btn" type="button">进入</button>
      <div id="login-err"></div>
    </div>
  </div>

  <!-- 网页版宿主 shim：renderer.js 通过 window.desktop 与宿主交互 -->
  <script>
    window.desktop = {
      isWeb: true,
      getConfig: function () { return fetch("/live2dchat/config").then(function (r) { return r.json(); }); },
      saveFile: function (name, bytes) {
        try {
          var blob = new Blob([bytes]);
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = name || "download";
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
          return Promise.resolve({ ok: true });
        } catch (e) { return Promise.resolve({ ok: false, error: String(e) }); }
      },
      moveBy: function () {}, setIgnoreMouse: function () {}, quit: function () {}, showContextMenu: function () {},
    };
  </script>

  <!-- 引导：先探测 /config 是否需要口令；需要则弹口令框，通过后再按序加载渲染端 -->
  <script>
    (function () {
      var SCRIPTS = [
        "/live2dchat/static/vendor/pixi.min.js",
        "/live2dchat/static/vendor/live2dcubismcore.min.js",
        "/live2dchat/static/vendor/cubism4.min.js",
        "/live2dchat/static/renderer.js",
      ];
      var booted = false;
      function loadSeq(i) {
        if (i >= SCRIPTS.length) return;
        var s = document.createElement("script");
        s.src = SCRIPTS[i];
        s.onload = function () { loadSeq(i + 1); };
        s.onerror = function () { console.error("加载失败:", SCRIPTS[i]); };
        document.body.appendChild(s);
      }
      function boot() { if (booted) return; booted = true; loadSeq(0); }

      var mask = document.getElementById("login-mask");
      var pwd = document.getElementById("login-pwd");
      var btn = document.getElementById("login-btn");
      var err = document.getElementById("login-err");
      function showLogin() { mask.classList.add("show"); pwd.focus(); }
      async function submit() {
        err.textContent = "";
        try {
          var r = await fetch("/live2dchat/auth", {
            method: "POST", headers: { "Content-Type": "application/json" },
            credentials: "include", body: JSON.stringify({ password: pwd.value }),
          });
          if (r.ok) { mask.classList.remove("show"); boot(); return; }
          err.textContent = "口令错误，请重试";
        } catch (e) { err.textContent = "无法连接服务端"; }
      }
      btn.addEventListener("click", submit);
      pwd.addEventListener("keydown", function (e) { if (e.key === "Enter") submit(); });

      (async function () {
        try {
          var r = await fetch("/live2dchat/config", { credentials: "include" });
          if (r.status === 401) { showLogin(); return; }
        } catch (e) { /* 探测失败也尝试启动，由 renderer 显示错误 */ }
        boot();
      })();
    })();
  </script>
</body>
</html>
