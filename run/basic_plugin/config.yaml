心知天气:
  api_key: ""     #https://www.seniverse.com/ 申请后，填私钥
image_search:
  sauceno_api_key: ""          #sauceno搜图api，你可以从https://saucenao.com/user.php注册并获取
nasa_api:
  api_key: ""   #nasa的每日天文api 从https://api.nasa.gov/index.html#main-content申请
setu:
  r18mode: true
  download: true #关掉的话就是直接发送url，灰度图不生效。
  gray_layer: true #是否开启灰度图功能
  setu_operate_level: 0    #色图功能所需等级
  today_img_list:       #此处为今日系列触发词，比如 今日 巨乳/贫乳/黑丝 等，你填了什么就会搜索什么
    - '巨乳'
    - '贫乳'
    - '萝莉'
    - '黑丝'
    - '白丝'
tarot:
  lock: false #是否开启卡片锁定功能，现在没写锁定，开了也没用
  mode: "blueArchive" #牌面。可填 blueArchive,bilibili,AbstractImages
  彩蛋牌:
    enable: true #是否开启彩蛋牌
    probability: 5 #彩蛋牌出现概率
    card_index:
      - data/pictures/tarot/hidden_tarot/dio.jpg: ""
      - data/pictures/tarot/hidden_tarot/GIOGIO.jpg: ""
      - data/pictures/tarot/hidden_tarot/gyro.jpg: ""
      - data/pictures/tarot/hidden_tarot/hp.jpg: ""
      - data/pictures/tarot/hidden_tarot/johnny.jpg: ""
      - data/pictures/tarot/hidden_tarot/joseph.jpg: ""
      - data/pictures/tarot/hidden_tarot/vlt.jpg: ""
搜图:
  search_image_resource_operate_level: 0  #图片搜索功能所需等级
  聚合搜图: true          #搜单图
  soutu_bot: true       #搜本子
self_condition:         #bot自身状态检测
  enable: False         #目前该模块打开会导致内存增加，请依据自身情况打开
enabled: true           #今天是什么少女
