code_generation_permission_need: 100 #100级以上权限用户才可以生成代码
prefix: "/写插件"
多轮对话: true
使用模型: "gemini-2.5-pro"        # endpoint.base_url 为空时的回退模型名（走 ai 聊天插件的 gemini 端点）
# 专用端点：独立于 ai 聊天插件，可自选更强的代码模型。base_url 留空则回退到上面的「使用模型」。
endpoint:
  type: "openai"                 # openai(兼容) | gemini
  base_url: ""                   # 例: https://api.deepseek.com/v1 或 https://api.openai.com/v1
  api_key: ""
  model: ""                      # 例: deepseek-coder / gpt-4o / claude-3-5-sonnet 等
